# work-plan config — copied to ~/.claude/work-plan/config.yml on first install.
#
# notes_root: where your track markdown files live. Each repo gets a subdirectory:
#   <notes_root>/<repo-key>/<track-slug>.md
#
# install.sh resolves the relative ./notes path below to the absolute path of
# the bundled notes/ folder in this toolkit, so the default works out of the box.
# Override with your own path (e.g. ~/Documents/Project Notes/) at any time.
notes_root: ./notes

# repos: map local subdir-keys (under notes_root) to GitHub repos.
# Ships empty — populate via /work-plan init-repo <key> --github=<org/repo>,
# or add blocks manually in the shape below:
#
#   myproject:
#     github: your-org/myproject
#     local: /path/to/local/checkout    # optional, enables in-progress detection
repos: {}

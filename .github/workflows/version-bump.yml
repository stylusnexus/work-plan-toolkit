name: Bump VERSION

# Fires when a deploy PR is MERGED into main, plus a manual fallback.
#
# Why pull_request (not push: main): a `push` to main produced by a PR merge
# via the API / `gh pr merge --admin` does NOT generate a push event that
# triggers workflows (observed 2026-04-30 onward: deploys #65/#67/#74 merged
# to main but the old `push: branches:[main]` trigger never fired, so VERSION
# stalled). The `pull_request: closed` event IS reliably emitted by the merge
# itself, so it catches every deploy. workflow_dispatch gives a manual path
# (e.g. to bump after a deploy that predates this fix).
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

# Serialize bump runs so two near-simultaneous merges can't both write VERSION.
concurrency:
  group: version-bump-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    name: Bump VERSION to <date>+<sha>
    runs-on: ubuntu-latest
    # Only on a real merge to main (not a closed-without-merge PR) or a manual
    # run, and never re-entrant from the bot's own [skip ci] commit.
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true)
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main          # pull_request checks out a merge ref by default; we want main's tip
          fetch-depth: 0

      - name: Compute and write VERSION
        id: compute
        run: |
          DATE=$(date -u +%Y.%m.%d)
          SHA=$(git rev-parse --short HEAD)
          NEW="${DATE}+${SHA}"
          echo "$NEW" > VERSION
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      # Prepend a CHANGELOG entry from the merged deploy PR's title + body.
      # Only on a real PR merge (workflow_dispatch has no PR context).
      - name: Prepend CHANGELOG entry
        if: github.event_name == 'pull_request'
        env:
          NEW_VERSION: ${{ steps.compute.outputs.new_version }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import os
          ver = os.environ["NEW_VERSION"]
          date = ver.split("+")[0].replace(".", "-")  # 2026.06.04 -> 2026-06-04
          title = os.environ.get("PR_TITLE", "").strip()
          body = os.environ.get("PR_BODY", "").strip()
          num = os.environ.get("PR_NUM", "")
          entry = f"## {ver} — {date} (#{num})\n\n{title}\n"
          if body:
              entry += "\n" + body + "\n"
          entry += "\n"
          marker = "<!-- new entries inserted below -->\n"
          path = "CHANGELOG.md"
          cl = open(path).read() if os.path.exists(path) else "# Changelog\n\n" + marker
          if marker in cl:
              head, _, tail = cl.partition(marker)
              cl = head + marker + "\n" + entry + tail.lstrip("\n")
          else:
              cl = cl.rstrip() + "\n\n" + entry
          open(path, "w").write(cl)
          print(f"CHANGELOG: prepended {ver}")
          PY

      - name: Commit and push if anything changed
        env:
          NEW_VERSION: ${{ steps.compute.outputs.new_version }}
        run: |
          if git diff --quiet VERSION CHANGELOG.md; then
            echo "VERSION/CHANGELOG already current — nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add VERSION CHANGELOG.md
          git commit -m "chore(version): bump to $NEW_VERSION [skip ci]"
          # Absorb anything that landed on main while this job was queueing.
          git pull --rebase origin main
          git push origin main

name: Publish CLI to npm

# Publishes the Python work-plan CLI as @stylusnexus/work-plan on npm, so it can
# be installed with `npm install -g @stylusnexus/work-plan` (e.g. for VS Code
# extension users who don't use the Claude/Codex plugin).
#
# Needs an Actions secret: NPM_TOKEN — an npmjs.com automation token with publish
# rights to the @stylusnexus scope. Dormant until it exists.
#
# Run manually. dry_run=true (default) packs + validates without publishing.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Pack + validate only — do not publish'
        type: boolean
        default: true
      version_suffix:
        description: 'Optional prerelease suffix (e.g. "-1") for same-day republish when CalVer is already taken'
        type: string
        default: ''

jobs:
  publish:
    name: pack · publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Derive npm version from VERSION (CalVer → semver)
        id: ver
        run: |
          RAW="$(cat VERSION)"            # e.g. 2026.06.09+8c10fe0
          BASE="${RAW%%+*}"              # 2026.06.09  (drop +sha build metadata)
          # npm/semver rejects leading zeros, so 2026.06.09 → 2026.6.9
          SEMVER="$(echo "$BASE" | awk -F. '{printf "%d.%d.%d", $1, $2, $3}')"
          SUFFIX="${{ inputs.version_suffix }}"
          FULL_VER="${SEMVER}${SUFFIX}"
          echo "semver=$FULL_VER" >> "$GITHUB_OUTPUT"
          echo "Publishing version $FULL_VER (from VERSION=$RAW, suffix='$SUFFIX')"

      - name: Stamp the version into package.json
        run: npm pkg set version="${{ steps.ver.outputs.semver }}"

      - name: Pack the tarball (always — proves the package is well-formed)
        run: npm pack

      - name: Publish to npm
        if: ${{ inputs.dry_run == false }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: work-plan-npm-tarball
          path: '*.tgz'
          if-no-files-found: error

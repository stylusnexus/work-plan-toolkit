name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unittest:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }} unittest
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
        include:
          - os: macos-latest
            python-version: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mikefarah/yq
        run: |
          case "${{ runner.os }}" in
            Linux) BIN=yq_linux_amd64 ;;
            macOS) BIN=yq_darwin_arm64 ;;
            *) echo "Unsupported runner: ${{ runner.os }}" >&2; exit 1 ;;
          esac
          sudo curl -sSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.53.2/$BIN"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Run work-plan unittest suite
        working-directory: skills/work-plan
        run: python3 -m unittest discover tests

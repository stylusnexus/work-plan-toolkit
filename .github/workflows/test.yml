name: Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

# Cancel superseded runs on feature branches and PRs to save Actions minutes
# during rapid iteration. Pushes to main and dev are never cancelled so the
# integration branches retain a complete green-check history per commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

jobs:
  # Fast pre-matrix lint catches PEP 604 union annotations that would fail at
  # module-load time on Python 3.9. Without this gate, the 3.9 matrix cell is
  # the only line of defense — and it only fires after a PR is opened. The
  # lint runs in seconds and short-circuits the matrix on failure.
  lint-py39:
    name: Python 3.9 union-syntax lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run py39 union-syntax lint
        run: python3 scripts/lint_py39_unions.py

  unittest:
    needs: lint-py39
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }} unittest
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mikefarah/yq (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          case "${{ runner.os }}" in
            Linux) BIN=yq_linux_amd64 ;;
            macOS) BIN=yq_darwin_arm64 ;;
            *) echo "Unsupported runner: ${{ runner.os }}" >&2; exit 1 ;;
          esac
          sudo curl -sSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.53.2/$BIN"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install mikefarah/yq (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://github.com/mikefarah/yq/releases/download/v4.53.2/yq_windows_amd64.exe"
          $dest = "$env:RUNNER_TEMP\yq.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $dest -Parent)

      - name: Verify yq on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: yq --version

      - name: Run work-plan unittest suite (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: skills/work-plan
        run: python3 -m unittest discover tests

      - name: Run work-plan unittest suite (Windows)
        if: runner.os == 'Windows'
        working-directory: skills/work-plan
        env:
          # Force UTF-8 stdout. Windows runners default to cp1252 in non-tty
          # mode, which can't encode unicode chars used in _print_help().
          PYTHONUTF8: "1"
        run: python -m unittest discover tests

      # The bin/work-plan launcher is a bash script; this test execs it, so it
      # runs on Linux/macOS only (Windows uses bin/work-plan.cmd, not covered here).
      - name: Run bin/work-plan launcher test (Linux/macOS)
        if: runner.os != 'Windows'
        run: python3 tests/test_bin_wrapper.py

  # Installer smoke test on Linux (#5). The unittest matrix exercises the CLI but
  # never runs install.sh or its --target override, and it downloads the yq binary
  # directly rather than going through the README one-liners. This job mechanizes
  # the installer-centric acceptance criteria from #5: install.sh --help, a real
  # install into a scratch target, the --target override, and work_plan.py --help.
  # What stays genuinely manual is the per-distro package-manager one-liners
  # (apt/pacman/dnf) and non-Ubuntu distros — GitHub-hosted Ubuntu can't prove those.
  smoke-install:
    name: install.sh smoke (ubuntu)
    needs: lint-py39
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mikefarah/yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v4.53.2/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: install.sh --help renders
        run: |
          out=$(./install.sh --help)
          echo "$out"
          echo "$out" | grep -q "Usage: ./install.sh"

      - name: install.sh into a scratch target
        run: |
          target="${RUNNER_TEMP}/claude"
          mkdir -p "${target}"
          ./install.sh --target="${target}"
          test -f "${target}/skills/work-plan/work_plan.py"
          test -f "${target}/skills/work-plan/.installed-from"
          test -f "${target}/commands/work-plan.md"

      - name: install.sh --target override (Codex layout)
        run: |
          target="${RUNNER_TEMP}/agents"
          mkdir -p "${target}"
          ./install.sh --target="${target}"
          test -f "${target}/skills/work-plan/work_plan.py"

      - name: work_plan.py --help executes
        run: python3 skills/work-plan/work_plan.py --help
